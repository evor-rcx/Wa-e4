name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --ignore-scripts
          npm rebuild @tailwindcss/oxide --update-binary || true
          npm install

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap sync

      - name: Add permissions to AndroidManifest
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_CONTACTS" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />|' android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin duplicate classes
        run: |
          sed -i '/^dependencies {/a\    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("fix duplicate") }\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("fix duplicate") }\n    }' android/app/build.gradle

      - name: Set APK Icon
        run: |
          sudo apt-get install -y imagemagick
          convert public/ic_launcher_round.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert public/ic_launcher_round.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert public/ic_launcher_round.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert public/ic_launcher_round.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert public/ic_launcher_round.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert public/ic_launcher_round.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert public/ic_launcher_round.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert public/ic_launcher_round.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert public/ic_launcher_round.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert public/ic_launcher_round.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WA-E4-Messenger
          path: android/app/build/outputs/apk/debug/app-debug.apk
