name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --ignore-scripts
          npm rebuild @tailwindcss/oxide --update-binary || true
          npm install

      - name: Build web
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "WA E4" "com.evor.wae4" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: Fix Kotlin duplicate classes
        run: |
          cat >> android/build.gradle << 'GRADLE'
          
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          GRADLE

      - name: Set APK Icon
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert public/logo.jpg -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert public/logo.jpg -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert public/logo.jpg -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert public/logo.jpg -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert public/logo.jpg -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert public/logo.jpg -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert public/logo.jpg -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert public/logo.jpg -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert public/logo.jpg -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert public/logo.jpg -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
